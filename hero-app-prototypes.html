@import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --bg-deep: #f2f2f2;
  --bg-card: #ffffff;
  --bg-elevated: #f7f7f7;
  --border-subtle: rgba(109,110,113,0.15);
  --border-hover: rgba(229,147,62,0.4);
  --text-primary: #1F2225;
  --text-secondary: #4a4a4a;
  --text-muted: #6d6e71;
  --accent: #e5933e;
  --accent-secondary: #ed6522;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
}
* { box-sizing: border-box; }
body { font-family: 'Open Sans', Arial, Calibri, sans-serif; background: var(--bg-deep); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
h1,h2,h3 { font-family: Arial, sans-serif; font-weight: 700; }
code, .mono { font-family: 'JetBrains Mono', monospace; }
.glass { background: #ffffff; border-bottom: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm); }
.card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px; box-shadow: var(--shadow-md); }
.chain-arrow { color: var(--accent); }
.tool-node { border: 2px solid var(--border-subtle); background: #fff; transition: all 0.3s; }
.tool-node.active { border-color: var(--accent); box-shadow: 0 0 16px rgba(229,147,62,0.2); background: rgba(229,147,62,0.04); }
.tool-node.completed { border-color: #22c55e; background: rgba(34,197,94,0.04); }
.chat-bubble-ai { background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: 12px 12px 12px 4px; color: var(--text-primary); }

.fade-in { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.typing::after { content:'...'; animation: dots 1.5s infinite; }
@keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
.tab-btn { transition: all 0.2s; }
.tab-btn.active { background: linear-gradient(135deg, #e5933e, #ed6522); color: white; }
.output-table td { padding: 6px 10px; border-bottom: 1px solid var(--border-subtle); font-size: 0.8rem; color: var(--text-secondary); }
.output-table th { padding: 6px 10px; border-bottom: 2px solid var(--accent); font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); text-align: left; }
</style>
</head>

      </div>

        ${HERO_APPS.map((a, i) => `
          <button onclick="selectApp(${i})" class="tab-btn px-3 py-1.5 rounded-lg text-xs font-medium ${currentApp === i ? 'active' : ''}" style="${currentApp !== i ? 'color:var(--text-muted);' : ''}">
            ${a.icon} ${a.id === 'vendor' ? 'Vendor Compare' : a.id === 'recruiter' ? 'Recruiter' : a.id === 'transcript' ? 'Transcript' : a.name.split(' ')[0]}
          </button>
        `).join('')}

    </div>
  </div>

  <div class="max-w-6xl mx-auto px-6 py-6">
    <!-- App Header -->
    <div class="text-center mb-8 fade-in">
      <div class="text-5xl mb-3">${app.icon}</div>
      <h1 class="text-3xl mb-1" style="color:var(--text-primary)">${app.name}</h1>
      <p style="color:var(--text-muted)">${app.tagline}</p>
      <div class="text-xs mt-2" style="color:var(--accent)">${app.industry} • Capabara Tool Chain (4 steps)</div>
    </div>

    <!-- Tool Chain Diagram -->
    <div class="card p-6 mb-6">
      <div class="flex items-center justify-between mb-4">

        <button onclick="runDemo()" class="px-4 py-2 rounded-lg text-sm font-semibold text-white transition ${isAnimating ? 'opacity-50 cursor-not-allowed' : ''}" style="background:linear-gradient(135deg,#e5933e,#ed6522)">

      <div class="flex items-stretch gap-2 overflow-x-auto pb-2">
        ${app.chain.map((step, i) => `
          <div class="flex items-stretch gap-2 flex-1 min-w-0">
            <div class="tool-node rounded-xl p-4 flex-1 min-w-[180px] ${chainStep > i ? 'completed' : chainStep === i ? 'active' : ''}" id="node-${i}">
              <div class="text-2xl mb-2">${step.icon}</div>
              <div class="text-sm font-bold mb-1" style="color:var(--text-primary)">${step.tool}</div>
              <div class="text-xs mb-3" style="color:var(--text-muted)">${step.desc}</div>
              <div class="text-xs">
                <div class="mb-1" style="color:var(--text-muted)"><span style="color:var(--accent);font-weight:600">IN:</span> ${step.input}</div>

function renderChat(app) {
  const allMessages = getChatMessages(app);
  const visibleMessages = chatStep > 0 ? allMessages.slice(0, chatStep) : allMessages;
  const isLastStep = chatStep >= allMessages.length;

  let html = visibleMessages.map((msg, i) => {
    const isNewest = (i === visibleMessages.length - 1) && !isLastStep && isAnimating;
    const animClass = isNewest ? 'fade-in' : '';
    if (msg.role === 'system') return `<div class="text-center text-xs py-2" style="color:var(--text-muted) ${animClass}">${msg.text}</div>`;
    if (msg.role === 'user') return `<div class="flex justify-end ${animClass}"><div class="chat-bubble-user px-4 py-2 max-w-[85%] text-sm">${msg.text}</div></div>`;
    return `<div class="flex justify-start ${animClass}"><div class="chat-bubble-ai px-4 py-2 max-w-[85%] text-sm">${msg.text}</div></div>`;
  }).join('');

  // Show typing indicator if still animating
  if (isAnimating && !isLastStep) {
    html += '<div class="flex justify-start fade-in"><div class="chat-bubble-ai px-4 py-2 text-sm typing" style="color:var(--text-muted)">Processing</div></div>';
  }

  return html;
}

function selectApp(i) {
  currentApp = i;
  chainStep = -1;
  chatStep = 0;
  showOutput = false;
  isAnimating = false;
  render();
}

function runDemo() {
  if (isAnimating) return;
  isAnimating = true;
  chainStep = 0;
  chatStep = 0;
  showOutput = false;
  render();

  const app = HERO_APPS[currentApp];
  const chats = getChatMessages(app);
  const totalMessages = chats.length;
  let msgIndex = 0;
  let toolStep = 0;

  const interval = setInterval(() => {
    msgIndex++;
    chatStep = msgIndex;

    // Advance tool chain node based on chat progress
    // Map chat messages to tool chain steps (roughly: every few messages = next tool)
    const progressRatio = msgIndex / totalMessages;
    const newToolStep = Math.min(Math.floor(progressRatio * 4), 3);
    if (newToolStep > toolStep) {
      toolStep = newToolStep;
      chainStep = toolStep;
    }

    if (msgIndex >= totalMessages) {
      chainStep = 4; // all complete
      showOutput = true;
      isAnimating = false;
      clearInterval(interval);
    }
    render();

  }, 1200);
