<style>
:root {
  --bg-deep: #ffffff;
  --bg-card: #ffffff;
  --bg-elevated: #f7f7f7;

  --text-primary: #1F2225;
  --text-secondary: #4a4a4a;
  --text-muted: #6d6e71;
  --accent: #e5933e;
  --accent-secondary: #ed6522;
  --accent-glow: rgba(229,147,62,0.1);
  --jade: #22c55e;
  --signal-low: #c4c4c4;
  --signal-med: #e5933e;
  --signal-high: #ed6522;
  --signal-max: #22c55e;
  --card-bg: #ffffff;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.08), 0 4px 8px rgba(0,0,0,0.04);
}

* { box-sizing: border-box; }
body { font-family: 'Open Sans', Arial, Calibri, sans-serif; background: #f2f2f2; color: var(--text-primary); -webkit-font-smoothing: antialiased; }
h1, h2, h3 { font-family: Arial, sans-serif; font-weight: 700; }

.card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 16px;
  position: relative; z-index: 1;
  box-shadow: var(--shadow-md);
}
.card-elevated {
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: 12px;
  box-shadow: var(--shadow-sm);
}

/* Segmented gauge for scoring */
.gauge {
  display: flex; gap: 6px; position: relative;
}
.gauge-segment {
  flex: 1; position: relative; cursor: pointer;
  border-radius: 10px; padding: 14px 8px 12px;
  border: 1.5px solid var(--border-subtle);
  background: #fff;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  text-align: center;
}
.gauge-segment:hover {
  border-color: var(--border-hover);
  background: rgba(229,147,62,0.04);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}
.gauge-segment .label {
  font-size: 0.8rem; font-weight: 500; line-height: 1.3;
  color: var(--text-muted);
  transition: color 0.25s;
}
.gauge-segment .dot {
  width: 8px; height: 8px; border-radius: 50%; margin: 0 auto 8px;
  background: var(--signal-low); opacity: 0.4;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.gauge-segment[data-level="1"] .dot { background: var(--signal-med); }
.gauge-segment[data-level="2"] .dot { background: var(--signal-high); }
.gauge-segment[data-level="3"] .dot { background: var(--signal-max); }

/* Selected states */
.gauge-segment.sel-0 { border-color: var(--signal-low); background: rgba(196,196,196,0.1); }
.gauge-segment.sel-0 .dot { opacity: 1; box-shadow: 0 0 8px rgba(196,196,196,0.5); transform: scale(1.4); }
.gauge-segment.sel-0 .label { color: var(--text-primary); }

.gauge-segment.sel-1 { border-color: var(--signal-med); background: rgba(229,147,62,0.08); }
.gauge-segment.sel-1 .dot { opacity: 1; box-shadow: 0 0 10px rgba(229,147,62,0.4); transform: scale(1.4); }
.gauge-segment.sel-1 .label { color: #c47a2a; }

.gauge-segment.sel-2 { border-color: var(--signal-high); background: rgba(237,101,34,0.08); }
.gauge-segment.sel-2 .dot { opacity: 1; box-shadow: 0 0 12px rgba(237,101,34,0.4); transform: scale(1.4); }
.gauge-segment.sel-2 .label { color: #d45a1a; }

.gauge-segment.sel-3 { border-color: var(--signal-max); background: rgba(34,197,94,0.05); }
.gauge-segment.sel-3 .dot { opacity: 1; box-shadow: 0 0 14px rgba(34,197,94,0.4); transform: scale(1.4); }
.gauge-segment.sel-3 .label { color: #16a34a; }

/* Progress dots */
.step-dots { display: flex; gap: 6px; align-items: center; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--signal-low); opacity: 0.3; transition: all 0.3s; }
.step-dot.active { background: var(--accent); opacity: 1; width: 24px; border-radius: 4px; }
.step-dot.done { background: var(--jade); opacity: 0.7; }

/* Tabs */
.tab { padding: 8px 16px; font-size: 0.82rem; font-weight: 600; border-radius: 8px; transition: all 0.2s; color: var(--text-muted); letter-spacing: 0.02em; }
.tab:hover { color: var(--accent); background: rgba(229,147,62,0.06); }
.tab.on { color: #fff; background: linear-gradient(135deg, #e5933e, #ed6522); box-shadow: 0 2px 8px rgba(229,147,62,0.3); }

/* Industry cards */
.ind-card {
  border: 1.5px solid var(--border-subtle); border-radius: 12px; padding: 16px;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; text-align: left;
  background: #fff;
  box-shadow: var(--shadow-sm);
}
.ind-card:hover { border-color: var(--border-hover); transform: translateY(-2px); background: rgba(229,147,62,0.03); box-shadow: var(--shadow-md); }
.ind-card.picked { border-color: var(--accent); background: rgba(229,147,62,0.06); box-shadow: 0 4px 16px rgba(229,147,62,0.15); }

/* Thermal bar for score breakdown */
.thermal-bar { height: 6px; border-radius: 3px; background: #e8e8e8; overflow: hidden; }
.thermal-fill { height: 100%; border-radius: 3px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

/* Result badges */
.badge-hot { background: linear-gradient(135deg, #16a34a, #22c55e); color: white; }
.badge-warm { background: linear-gradient(135deg, #e5933e, #ed6522); color: white; }
.badge-cold { background: linear-gradient(135deg, #9ca3af, #6d6e71); color: white; }

/* Misc */
.fade-in { animation: fadeIn 0.35s ease-out; }
@keyframes fadeIn { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
.case-card { transition: all 0.2s; cursor: pointer; }
.case-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
select { background: #fff; color: var(--text-primary); border: 1px solid var(--border-subtle); font-family: 'Open Sans', Arial, sans-serif; box-shadow: var(--shadow-sm); }
input[type="number"] {
  background: #fff; border: 1.5px solid var(--border-subtle); color: var(--text-primary);

input[type="number"]:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px var(--accent-glow); }

  { id:"aviation_ceo", title:"$19M Aviation Company CEO Call", industry:"Logistics", source:"AI Automation Society", client:"$19M aviation company", problem:"CEO exploring AI automation for operations.", solution:"Targeted decision-maker directly, skipped gatekeepers.", result:"Direct CEO access with budget authority.", pricing:"Enterprise-level", closeTime:"In progress", buildTime:"N/A", keyInsight:"Always target the person with sign-off authority.", roiCalc:"Potential 5-6 figure deal", talkTrack:"There's a fascinating case of a $19 million aviation company exploring AI automation. The initial conversations were with the operations manager — great enthusiasm, lots of interest, but every decision ended with 'let me run it up the chain.' The breakthrough came when the conversation moved directly to the CEO. It's like selling a house — you want to talk to the buyer, not the estate agent's assistant. The CEO understood immediately: their operations team was drowning in shipping documentation, compliance checks, and customs paperwork. When you put the numbers in front of someone who actually signs cheques, the conversation shifts from 'can we afford this?' to 'can we afford NOT to do this?' That's an important lesson — making sure we're having this conversation with the right people in your organisation, the ones who can see the bigger picture and act on it." },

  { id:"housing_crm", title:"CRM for Veteran Housing Org", industry:"Non-Profit", source:"AI Automation Society", client:"Veteran housing organization", problem:"Needed better client tracking and document management.", solution:"Custom CRM with AI document processing.", result:"First paying client. Improved intake processing.", pricing:"Custom build", closeTime:"First win", buildTime:"Custom dev", keyInsight:"Non-profits have real budgets. Grant funding often covers tech.", roiCalc:"Reduced processing + better tracking", talkTrack:"Here's a case that might surprise you. A veteran housing organisation was tracking hundreds of beneficiaries using paper files and sticky notes. Picture a filing cabinet bursting at the seams, with case workers flipping through folders trying to find who's due for a follow-up — like a hospital trying to manage patient records on index cards. They implemented a simple CRM with AI document processing — intake forms get scanned and sorted automatically, follow-ups get scheduled, nothing falls through the cracks. The interesting takeaway: if AI can transform operations for a non-profit running on a shoestring budget, imagine what it can do for a business like yours with actual revenue behind it. And here's something people don't always realise — that organisation used grant funding earmarked for technology. Same principle applies to the MSG grant available to you: the government wants SMEs to modernise, and they're covering 90% of the cost." },

// Situational coaching based on score patterns
function getSituationalTips(tier, scores, industry) {
  const tips = [];
  const volScore = scores[0] || 0; // Q1: volume
  const hoursScore = scores[2] || 0; // Q3: hours
  const errorScore = scores[3] || 0; // Q4: error impact
  const toolScore = scores[4] || 0; // Q5: current tools
  const complexScore = scores[5] || 0; // Q6: document complexity

  if (tier === 'HOT') {
    tips.push({ icon:'🎯', title:'Strike while hot', tip:'This prospect has high volume AND high pain. Don\'t schedule a follow-up — demo NOW and close in the same meeting. Every day you wait, they get distracted.' });
    if (complexScore >= 2) tips.push({ icon:'📄', title:'Use their worst doc', tip:'They have complex documents. Ask for one RIGHT NOW. Process it live. This is your "mic drop" moment — nothing else you say will be as convincing.' });
    if (errorScore >= 2) tips.push({ icon:'💸', title:'Lead with error cost', tip:'They\'re bleeding money on errors. Quantify it: "If errors cost you $X per incident and you have Y incidents/month, that\'s $Z/year the AI eliminates."' });
  } else if (tier === 'WARM') {
    tips.push({ icon:'🎬', title:'Send a Loom first', tip:'Record a 3-minute Loom showing the industry scenario demo processing a sample document from their industry. Send it within 24 hours. Then book the live demo.' });
    if (volScore <= 1) tips.push({ icon:'📈', title:'Volume is low — sell the future', tip:'Their volume is modest now. Pitch growth: "As you scale, this saves more every month. Start now while the MSG grant covers 90%."' });
    if (toolScore <= 1) tips.push({ icon:'🔧', title:'They have existing tools', tip:'Don\'t position as replacement — position as enhancement. "This works alongside [their tool]. It handles the document processing that [tool] can\'t."' });
    tips.push({ icon:'⏰', title:'Create urgency', tip:'"We have limited MSG pilot slots this quarter. I can hold one for you, but I need confirmation by [date]." Scarcity converts warm to hot.' });
  } else {
    tips.push({ icon:'📋', title:'Nurture, don\'t push', tip:'Low score means low pain or low volume right now. Add to quarterly newsletter. Check back when their situation changes.' });
    tips.push({ icon:'🔄', title:'Ask for referrals', tip:'Even cold prospects know people: "This may not be the right fit for you now. Do you know anyone who processes a lot of [documents] who might benefit?"' });
    if (hoursScore <= 1) tips.push({ icon:'💡', title:'Maybe wrong department', tip:'Low hours might mean you\'re talking to the wrong person. Ask: "Who in your company spends the MOST time on document processing?"' });
  }

  // Universal tips
  if (toolScore >= 2) tips.push({ icon:'✅', title:'Easy integration signal', tip:'They use Google/basic tools — integration will be straightforward. Mention this: "Since you use [tool], we can have this running in days, not weeks."' });

  return tips;
}

function wizardSection(ind) {
  const totalQ = ind.questions.length;
  const totalSteps = Math.ceil(totalQ / 2);
  const isLastStep = S.step >= totalSteps - 1;
  const totalScore = Object.values(S.scores).reduce((a,b)=>a+b, 0);
  const maxScore = totalQ * 3;
  const answered = Object.keys(S.scores).length;

  const qi = S.step * 2;
  const content = ind.questions.slice(qi, qi + 2).map((q, j) => questionCard(q, qi + j)).join('');

  return `
  <div class="card p-6 mb-6">
    <div class="flex items-center justify-between mb-5">
      <div class="step-dots">
        ${Array.from({length:totalSteps}, (_,i) => `<div class="step-dot ${i===S.step?'active':i<S.step?'done':''}"></div>`).join('')}
      </div>
      <div class="flex items-center gap-3">
        <div class="text-xs" style="color:var(--text-muted)">${answered} of ${totalQ} answered</div>
        <div class="px-3 py-1 rounded-full text-xs font-semibold" style="background:${totalScore >= maxScore*0.75 ? 'rgba(34,197,94,0.12);color:#16a34a' : totalScore >= maxScore*0.5 ? 'rgba(229,147,62,0.12);color:#e5933e' : 'rgba(92,80,62,0.2);color:var(--text-muted)'}">
          ${totalScore} / ${maxScore}
        </div>
      </div>
    </div>

    ${content}

    <div class="flex justify-between mt-8 pt-5" style="border-top:1px solid var(--border-subtle)">
      <button onclick="wizPrev()" class="px-5 py-2.5 rounded-lg text-sm font-medium transition" style="${S.step===0?'opacity:0.25;cursor:not-allowed;color:var(--text-muted)':'color:var(--text-secondary);border:1px solid var(--border-subtle)'}">
        ← Back
      </button>
      ${!isLastStep ? `
        <button onclick="wizNext(${totalSteps})" class="px-6 py-2.5 rounded-lg text-sm font-semibold text-white transition" style="background:var(--accent)">
          Continue →
        </button>
      ` : `
        <button onclick="showResult()" class="px-6 py-2.5 rounded-lg text-sm font-bold text-white transition" style="background:linear-gradient(135deg,#e5933e,#ed6522)">
          Get Qualification Result →
        </button>
      `}
    </div>
  </div>
  `;
}

        </button>

    </div>
  </div>`;
}

      <div class="space-y-3">
        ${[
          ['"Too expensive."','"Your out-of-pocket is $3,000 — the government covers 90%."'],
          ['"Not ready yet."','"I can hold a pilot slot. What month works better?"'],
          ['"Prove it first."','"Let me process your worst document right now. 30 seconds."'],
          ['"Need boss approval."','"Happy to join that call. What questions will they have?"'],
          ['"We have a system."','"Does it handle [their pain]? This complements what you have."'],
          ['"AI isn\'t accurate."','"Great question — we have a systematic 5-phase approach to building and deploying our AI apps, designed exactly to ensure better data quality, output accuracy, and governance. There\'s also a lifecycle optimiser that continuously tests and reports on app performance. We can show you an example of the AI App Lifecycle Optimiser report."']
        ].map(([o,r])=>`<div class="card-elevated rounded-xl p-4"><div class="text-sm font-medium mb-1" style="color:#ef4444">${o}</div><div class="text-sm italic" style="color:var(--jade)">${r}</div></div>`).join('')}
      </div>
    </div>
    <div class="card p-6">
      <div class="text-xs font-semibold uppercase tracking-widest mb-4" style="color:var(--text-muted)">15-Minute Call Script</div>
      <div class="space-y-4">
        ${[['0 – 2 min','Rapport','"I help [industry] companies automate document processing — saving 60-80% of manual effort."'],['2 – 8 min','Discovery','Run through the 6 questions. Score mentally. Note the specific numbers.'],['8 – 10 min','Calculator','"You\'re spending [X hrs] at [$Y/hr] — that\'s $[Z]/month in waste."'],['10 – 13 min','Live Demo','"Send me your worst document now." Process live. "30 seconds vs X hours."'],['13 – 15 min','Close','"Government covers 90%. $3,000 out of pocket. X slots left. Shall we start?"']
        ].map(([t,p,s])=>`<div class="flex gap-4"><div class="w-20 flex-shrink-0"><div class="text-xs font-semibold" style="color:var(--accent)">${t}</div><div class="text-xs" style="color:var(--text-muted)">${p}</div></div><div class="text-sm" style="color:var(--text-secondary)">${s}</div></div>`).join('')}
      </div>
    </div>
  </div>`;
}

// ==================== ACTIONS ====================
function pickIndustry(k) { S.industry=k; S.scores={}; S.step=0; S.showResults=false; S.hoursPerMonth=40; S.hourlyRate=35; S.intelOpen=false; renderMain(); }
function score(idx,val) { S.scores[idx]=val; renderMain(); }
function wizNext(ts) { if(S.step<ts-1){S.step++;S.showResults=false;renderMain();} }
function wizPrev() { if(S.step>0){S.step--;S.showResults=false;renderMain();} }
function showResult() { inferFromScores(); S.showResults=true; S.tab='dashboard'; renderTabs(); renderMain(); window.scrollTo({top:0,behavior:'smooth'}); }
function inferFromScores() {
  const hoursScore = S.scores[2];
  const hourMaps = {
    manufacturing:{ 0:8,1:20,2:50,3:80 }, professional_services:{ 0:5,1:15,2:40,3:70 },
    healthcare:{ 0:10,1:25,2:60,3:100 }, hr_recruitment:{ 0:5,1:12,2:30,3:60 },
    real_estate:{ 0:4,1:10,2:25,3:50 }, general_sme:{ 0:6,1:15,2:35,3:65 },
    logistics:{ 0:8,1:18,2:45,3:75 }, education:{ 0:6,1:15,2:35,3:65 }
  };
  const rateMaps = {
    manufacturing:{ 0:18,1:25,2:40,3:55 }, professional_services:{ 0:25,1:50,2:100,3:200 },
    healthcare:{ 0:22,1:35,2:55,3:80 }, hr_recruitment:{ 0:20,1:30,2:45,3:65 },
    real_estate:{ 0:20,1:35,2:55,3:85 }, general_sme:{ 0:18,1:28,2:42,3:60 },
    logistics:{ 0:18,1:28,2:42,3:58 }, education:{ 0:18,1:28,2:42,3:58 }
  };
  const hMap = hourMaps[S.industry] || hourMaps.general_sme;
  const rMap = rateMaps[S.industry] || rateMaps.general_sme;
  if (hoursScore !== undefined) S.hoursPerMonth = hMap[hoursScore];
  if (hoursScore !== undefined) S.hourlyRate = rMap[hoursScore];
}
function toggleCase(i) { S.expandedCase=S.expandedCase===i?null:i; renderMain(); }
function calcUpdate() {
  S.hoursPerMonth=parseInt(document.getElementById('inp-hours')?.value)||0;
  S.hourlyRate=parseInt(document.getElementById('inp-rate')?.value)||0;
  const m=S.hoursPerMonth*S.hourlyRate;
  const e=id=>document.getElementById(id);
  if(e('calc-monthly'))e('calc-monthly').textContent='$'+m.toLocaleString();
  if(e('calc-annual'))e('calc-annual').textContent='$'+(m*12).toLocaleString();
  if(e('calc-roi'))e('calc-roi').textContent=Math.round(((m*12*0.7)-3000)/3000*100)+'%';
}

// ==================== INIT ====================
renderTabs(); renderMain();
</script>
</body>
</html>
